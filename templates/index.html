<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GL Kundu & Sons Steel — Assistant</title>
<style>
  body { font-family: sans-serif; background:#091435; color:#e8edf8; margin:0; display:flex; flex-direction:column; height:100vh; }
  header { background:#0d1f4e; border-bottom:2px solid #c9920a; padding:14px 18px; }
  header h1 { color:#f0c040; font-size:18px; margin:0; }
  header p { color:#8fa0c8; font-size:12px; margin:2px 0 0; }
  header a { color:#f0c040; font-size:13px; float:right; text-decoration:none; }
  #messages { flex:1; overflow-y:auto; padding:16px; }
  .msg { margin:10px 0; padding:10px 14px; border-radius:10px; max-width:80%; white-space:pre-wrap; line-height:1.5; }
  .ai { background:#152960; }
  .user { background:#1a3278; margin-left:auto; color:#fde9a0; }
  .row { display:flex; padding:12px; background:#0d1f4e; border-top:1px solid #1e3368; gap:8px; }
  #input { flex:1; padding:12px; border-radius:8px; border:1px solid #1e3368; background:#091435; color:#e8edf8; font-size:15px; }
  #send { background:#c9920a; border:none; border-radius:8px; padding:0 18px; color:#091435; font-weight:bold; font-size:15px; }
</style>
</head>
<body>
<header>
  <a href="/entry">+ Add Data</a>
  <h1>GL Kundu &amp; Sons Steel Pvt. Ltd</h1>
  <p>Authorised Distributor of Tata Steel · Malda</p>
</header>
<div id="messages">
  <div class="msg ai">Namaskar! Ask me about your stock, customers, payments, or sales — in English, Hindi, or Bengali.</div>
</div>
<div class="row">
  <input id="input" placeholder="Type your question..." onkeydown="if(event.key==='Enter')send()" />
  <button id="send" onclick="send()">Send</button>
</div>
<script>
let history = [];
function add(role, text){
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  const m = document.getElementById('messages');
  m.appendChild(d); m.scrollTop = m.scrollHeight;
}
async function send(){
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if(!text) return;
  add('user', text); inp.value='';
  history.push({role:'user', content:text});
  add('ai', '...');
  const dots = document.getElementById('messages').lastChild;
  try {
    const res = await fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({history})});
    const data = await res.json();
    dots.textContent = data.reply;
    history.push({role:'assistant', content:data.reply});
  } catch(e){
    dots.textContent = '⚠️ Could not reach the server. Please try again.';
  }
}
</script>
</body>
</html>
